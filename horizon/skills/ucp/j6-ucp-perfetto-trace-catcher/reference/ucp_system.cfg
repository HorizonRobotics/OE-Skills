# UCP + ftrace + BPU trace config
# Sampling duration: 10s
duration_ms: 10000

# buffer 0 - ftrace
buffers {
  size_kb: 131072
  fill_policy: RING_BUFFER
}

# buffer 1 - sys stats + UCP trace
buffers {
  size_kb: 131072
  fill_policy: RING_BUFFER
}

# ftrace
data_sources {
  config {
    name: "linux.ftrace"
    target_buffer: 0
    ftrace_config {
      buffer_size_kb: 32768
      drain_period_ms: 300
      compact_sched: {
        enabled: true
      }
      ftrace_events: "sched/sched_process_exec"
      ftrace_events: "sched/sched_process_exit"
      ftrace_events: "sched/sched_process_fork"
      ftrace_events: "sched/sched_process_free"
      ftrace_events: "sched/sched_process_hang"
      ftrace_events: "sched/sched_process_wait"
      ftrace_events: "sched/sched_switch"
      ftrace_events: "sched/sched_wakeup_new"
      ftrace_events: "sched/sched_wakeup"
      ftrace_events: "sched/sched_waking"
      ftrace_events: "task/task_newtask"
      ftrace_events: "task/task_rename"
    }
  }
}

# Memory info
data_sources {
  config {
    name: "linux.sys_stats"
    target_buffer: 1
    sys_stats_config {
      meminfo_period_ms: 1000
      meminfo_counters: MEMINFO_MEM_AVAILABLE
      meminfo_counters: MEMINFO_BUFFERS
      meminfo_counters: MEMINFO_CACHED
      meminfo_counters: MEMINFO_SWAP_CACHED
      meminfo_counters: MEMINFO_ACTIVE
      meminfo_counters: MEMINFO_INACTIVE
      meminfo_counters: MEMINFO_ACTIVE_ANON
      meminfo_counters: MEMINFO_INACTIVE_ANON
      meminfo_counters: MEMINFO_ACTIVE_FILE
      meminfo_counters: MEMINFO_INACTIVE_FILE
      meminfo_counters: MEMINFO_UNEVICTABLE

      # DDR bandwidth info
      ddrinfo_period_ms: 1000
      # ION memory info
      ion_period_ms: 1000
    }
  }
}

# Process memory info
data_sources: {
    config {
        name: "linux.process_stats"
        target_buffer: 1
        process_stats_config {
            proc_stats_poll_ms: 1000
        }
    }
}

# BPU trace
data_sources: {
    config {
        name: "linux.sys_stats"
        # write data to buffer 0
        target_buffer: 0
        sys_stats_config {
            bputrace_period_ms: 500
        }
    }
}

# UCP data source
data_sources: {
    config {
        name: "track_event"
        target_buffer: 1
        track_event_config {
           enabled_categories: "dnn"
        }
    }
}
